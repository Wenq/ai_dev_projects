<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rainbow Star Adventure</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #ffb6c1;
        }
        .game-info {
            position: absolute;
            top: 10px;
            right: 10px;
            color: black;
            font-size: 18px;
            font-weight: bold;
        }
        .game-buttons {
            position: absolute;
            top: 10px;
            left: 10px;
        }
        button {
            padding: 8px 16px;
            margin: 0 5px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .quit-btn {
            background-color: #ff0000;
            color: white;
        }
        .music-control {
            position: absolute;
            bottom: 10px;
            left: 10px;
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 8px 12px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .music-control input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
        }
        .music-control label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            user-select: none;
        }
        .difficulty-control {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 8px 12px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .difficulty-control label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-right: 8px;
            user-select: none;
        }
        .difficulty-control select {
            padding: 4px 8px;
            border: 2px solid #663399;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            color: #663399;
            background-color: white;
            cursor: pointer;
            outline: none;
        }
        .difficulty-control select:focus {
            border-color: #ff6b6b;
        }
        .start-screen, .pause-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.8);
        }
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="game-info">
        <div id="score">Score: 0</div>
        <div id="time">Time: 60</div>
    </div>
    <div class="game-buttons">
        <button class="quit-btn" onclick="quitGame()">Quit</button>
    </div>
    
    <div class="music-control">
        <input type="checkbox" id="bgmToggle" checked>
        <label for="bgmToggle">🎵 Background Music</label>
    </div>
    
    <div class="difficulty-control">
        <label for="difficultySelect">👾 Bad Guys:</label>
        <select id="difficultySelect">
            <option value="3" selected>3 (Easy)</option>
            <option value="5">5 (Medium)</option>
            <option value="10">10 (Hard)</option>
        </select>
    </div>
    
    <div class="start-screen" id="startScreen">
        <h1>Rainbow Star Adventure</h1>
        <p>Tap anywhere to start</p>
        <p>Use arrow keys or swipe to move</p>
        <p>Collect stars, avoid obstacles</p>
    </div>
    
    <div class="pause-screen" id="pauseScreen" style="display: none;">
        <h1>Game Paused</h1>
        <p>Tap anywhere to continue</p>
    </div>
    
    <div class="game-over-screen" id="gameOverScreen" style="display: none;">
        <h1>Game Over!</h1>
        <h2 id="finalScore">Final Score: 0</h2>
        <p>Tap anywhere to restart</p>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const pauseScreen = document.getElementById('pauseScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreElement = document.getElementById('score');
        const timeElement = document.getElementById('time');
        const finalScoreElement = document.getElementById('finalScore');
        
        // Web Audio API
        let audioContext = null;
        let bgmOscillators = [];
        let bgmGainNode = null;
        let isBgmPlaying = false;
        
        // Background music toggle
        const bgmToggle = document.getElementById('bgmToggle');
        
        // Initialize audio context
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        // Play background music - gentle melody for children
        function playBackgroundMusic() {
            if (!bgmToggle.checked || isBgmPlaying) return;
            
            initAudio();
            isBgmPlaying = true;
            
            // Create gain node for volume control
            bgmGainNode = audioContext.createGain();
            bgmGainNode.gain.setValueAtTime(0.08, audioContext.currentTime); // Low volume for background
            bgmGainNode.connect(audioContext.destination);
            
            // Gentle melody notes (C major scale - happy and child-friendly)
            const melody = [
                { freq: 523.25, duration: 0.5 }, // C5
                { freq: 587.33, duration: 0.5 }, // D5
                { freq: 659.25, duration: 0.5 }, // E5
                { freq: 523.25, duration: 0.5 }, // C5
                { freq: 698.46, duration: 0.5 }, // F5
                { freq: 659.25, duration: 0.5 }, // E5
                { freq: 587.33, duration: 0.5 }, // D5
                { freq: 523.25, duration: 1.0 }, // C5 (longer)
            ];
            
            let currentTime = audioContext.currentTime;
            
            function playMelodyLoop() {
                if (!isBgmPlaying) return;
                
                melody.forEach((note, index) => {
                    const oscillator = audioContext.createOscillator();
                    const noteGain = audioContext.createGain();
                    
                    oscillator.connect(noteGain);
                    noteGain.connect(bgmGainNode);
                    
                    // Use sine wave for soft, gentle sound
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(note.freq, currentTime);
                    
                    // Soft attack and release
                    noteGain.gain.setValueAtTime(0, currentTime);
                    noteGain.gain.linearRampToValueAtTime(1, currentTime + 0.05);
                    noteGain.gain.setValueAtTime(1, currentTime + note.duration - 0.05);
                    noteGain.gain.linearRampToValueAtTime(0, currentTime + note.duration);
                    
                    oscillator.start(currentTime);
                    oscillator.stop(currentTime + note.duration);
                    
                    bgmOscillators.push(oscillator);
                    
                    currentTime += note.duration;
                });
                
                // Schedule next loop
                setTimeout(() => {
                    if (isBgmPlaying) {
                        currentTime = audioContext.currentTime;
                        playMelodyLoop();
                    }
                }, (currentTime - audioContext.currentTime) * 1000);
            }
            
            playMelodyLoop();
        }
        
        // Stop background music
        function stopBackgroundMusic() {
            isBgmPlaying = false;
            bgmOscillators.forEach(osc => {
                try {
                    osc.stop();
                } catch (e) {}
            });
            bgmOscillators = [];
        }
        
        // Toggle background music
        function toggleBackgroundMusic() {
            if (bgmToggle.checked) {
                playBackgroundMusic();
            } else {
                stopBackgroundMusic();
            }
        }
        
        // Listen for checkbox changes
        bgmToggle.addEventListener('change', toggleBackgroundMusic);
        
        // Play star sound
        function playStarSound() {
            initAudio();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.2);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }
        
        // Play game over sound
        function playGameOverSound() {
            initAudio();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.5);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }
        
        let WIDTH = 800;
        let HEIGHT = 600;
        let score = 0;
        let timeLeft = 60;
        let gameOver = false;
        let gamePaused = false;
        let gameStarted = false;
        let animationId = null;
        
        // Player settings
        const player = {
            x: WIDTH / 2,
            y: HEIGHT / 2,
            speed: 5,
            color: '#ffd700', // Gold
            mouthPhase: 0
        };
        
        // Star settings
        const stars = [];
        const starCount = 10;
        
        // Obstacle settings
        const obstacles = [];
        let obstacleCount = 3; // Default to 3 for easier difficulty
        
        // Difficulty selector
        const difficultySelect = document.getElementById('difficultySelect');
        
        // Listen for difficulty changes
        difficultySelect.addEventListener('change', () => {
            // Update obstacle count immediately
            obstacleCount = parseInt(difficultySelect.value);
            
            // Only reinitialize if game hasn't started or is over
            if (!gameStarted || gameOver) {
                initGame();
            } else {
                // If game is in progress, just update obstacles
                updateObstaclesCount();
            }
        });
        
        // Update obstacles count without full reinitialization
        function updateObstaclesCount() {
            const currentCount = obstacles.length;
            const targetCount = obstacleCount;
            
            if (targetCount > currentCount) {
                // Add more obstacles
                for (let i = currentCount; i < targetCount; i++) {
                    obstacles.push({
                        x: 50 + Math.random() * (WIDTH - 100),
                        y: 50 + Math.random() * (HEIGHT - 100),
                        speedX: Math.random() > 0.5 ? 2 : -2,
                        speedY: Math.random() > 0.5 ? 2 : -2,
                        color: '#663399' // Dark purple
                    });
                }
            } else if (targetCount < currentCount) {
                // Remove excess obstacles
                obstacles.splice(targetCount);
            }
        }
        
        // Color settings
        const BACKGROUND_COLORS = ['#ffb6c1', '#add8e6', '#90ee90', '#ffffb6', '#dda0dd'];
        let currentBgColor = 0;
        
        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;
        
        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 60;
            gameOver = false;
            gamePaused = false;
            gameStarted = false;
            
            // Update obstacle count based on difficulty selection
            obstacleCount = parseInt(difficultySelect.value);
            
            // Reset player
            player.x = WIDTH / 2;
            player.y = HEIGHT / 2;
            player.mouthPhase = 0;
            
            // Reset stars
            stars.length = 0;
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: 50 + Math.random() * (WIDTH - 100),
                    y: 50 + Math.random() * (HEIGHT - 100),
                    color: `rgb(${Math.floor(Math.random() * 256)}, ${Math.floor(Math.random() * 256)}, ${Math.floor(Math.random() * 256)})`
                });
            }
            
            // Reset obstacles
            obstacles.length = 0;
            for (let i = 0; i < obstacleCount; i++) {
                obstacles.push({
                    x: 50 + Math.random() * (WIDTH - 100),
                    y: 50 + Math.random() * (HEIGHT - 100),
                    speedX: Math.random() > 0.5 ? 2 : -2,
                    speedY: Math.random() > 0.5 ? 2 : -2,
                    color: '#663399' // Dark purple
                });
            }
            
            // Update display
            updateDisplay();
        }
        
        // Update display
        function updateDisplay() {
            scoreElement.textContent = `Score: ${score}`;
            timeElement.textContent = `Time: ${Math.floor(timeLeft)}`;
            finalScoreElement.textContent = `Final Score: ${score}`;
        }
        
        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = BACKGROUND_COLORS[currentBgColor];
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            
            // Draw player
            drawPlayer();
            
            // Draw stars
            drawStars();
            
            // Draw obstacles
            drawObstacles();
        }
        
        // Draw player
        function drawPlayer() {
            // Draw body
            ctx.beginPath();
            ctx.arc(player.x, player.y, 30, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            
            // Draw eyes
            ctx.beginPath();
            ctx.arc(player.x - 10, player.y - 10, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(player.x + 10, player.y - 10, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(player.x - 10, player.y - 10, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(player.x + 10, player.y - 10, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();
            
            // Draw animated mouth (more realistic human-like mouth)
            const mouthOpenness = Math.abs(Math.sin(player.mouthPhase)) * 18;
            const mouthWidth = 28;
            const mouthCenter = player.y + 8;
            
            // Draw upper lip
            ctx.beginPath();
            ctx.arc(player.x, mouthCenter - mouthOpenness / 2, mouthWidth / 2, Math.PI, 0);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw lower lip
            ctx.beginPath();
            ctx.arc(player.x, mouthCenter + mouthOpenness / 2, mouthWidth / 2, 0, Math.PI);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Connect the ends
            ctx.beginPath();
            ctx.moveTo(player.x - mouthWidth / 2, mouthCenter - mouthOpenness);
            ctx.lineTo(player.x - mouthWidth / 2, mouthCenter);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(player.x + mouthWidth / 2, mouthCenter - mouthOpenness);
            ctx.lineTo(player.x + mouthWidth / 2, mouthCenter);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        // Draw stars
        function drawStars() {
            stars.forEach(star => {
                const size = 20;
                const outerPoints = [];
                const innerPoints = [];
                
                // Calculate outer points
                for (let i = 0; i < 5; i++) {
                    const angle = i * 72 - 90;
                    const x = star.x + size * Math.cos(angle * Math.PI / 180);
                    const y = star.y + size * Math.sin(angle * Math.PI / 180);
                    outerPoints.push({x, y});
                }
                
                // Calculate inner points
                const innerSize = size * 0.382; // Golden ratio
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 72 + 36) - 90;
                    const x = star.x + innerSize * Math.cos(angle * Math.PI / 180);
                    const y = star.y + innerSize * Math.sin(angle * Math.PI / 180);
                    innerPoints.push({x, y});
                }
                
                // Build star points
                const starPoints = [];
                for (let i = 0; i < 5; i++) {
                    starPoints.push(outerPoints[i]);
                    starPoints.push(innerPoints[i]);
                }
                
                // Fill star
                ctx.beginPath();
                ctx.moveTo(starPoints[0].x, starPoints[0].y);
                for (let i = 1; i < starPoints.length; i++) {
                    ctx.lineTo(starPoints[i].x, starPoints[i].y);
                }
                ctx.closePath();
                ctx.fillStyle = star.color;
                ctx.fill();
                
                // Draw star border
                ctx.beginPath();
                ctx.moveTo(starPoints[0].x, starPoints[0].y);
                for (let i = 1; i < starPoints.length; i++) {
                    ctx.lineTo(starPoints[i].x, starPoints[i].y);
                }
                ctx.closePath();
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
                ctx.stroke();
            });
        }
        
        // Draw obstacles
        function drawObstacles() {
            obstacles.forEach(obstacle => {
                // Draw body
                ctx.beginPath();
                ctx.arc(obstacle.x, obstacle.y, 20, 0, Math.PI * 2);
                ctx.fillStyle = obstacle.color;
                ctx.fill();
                
                // Draw eyes
                ctx.beginPath();
                ctx.arc(obstacle.x - 8, obstacle.y - 8, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(obstacle.x + 8, obstacle.y - 8, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(obstacle.x - 8, obstacle.y - 8, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#ff0000';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(obstacle.x + 8, obstacle.y - 8, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#ff0000';
                ctx.fill();
                
                // Draw evil mouth
                ctx.beginPath();
                ctx.moveTo(obstacle.x - 12, obstacle.y + 5);
                ctx.lineTo(obstacle.x + 12, obstacle.y + 5);
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }
        
        // Update game state
        function update() {
            if (!gameStarted || gamePaused || gameOver) {
                return;
            }
            
            // Animate player's mouth
            player.mouthPhase += 0.1;
            if (player.mouthPhase > Math.PI * 2) {
                player.mouthPhase = 0;
            }
            
            // Move player
            if (keys.left && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys.right && player.x < WIDTH) {
                player.x += player.speed;
            }
            if (keys.up && player.y > 0) {
                player.y -= player.speed;
            }
            if (keys.down && player.y < HEIGHT) {
                player.y += player.speed;
            }
            
            // Move obstacles
            obstacles.forEach(obstacle => {
                obstacle.x += obstacle.speedX;
                obstacle.y += obstacle.speedY;
                
                // Boundary detection
                if (obstacle.x < 0 || obstacle.x > WIDTH) {
                    obstacle.speedX *= -1;
                }
                if (obstacle.y < 0 || obstacle.y > HEIGHT) {
                    obstacle.speedY *= -1;
                }
            });
            
            // Detect star collision
            for (let i = stars.length - 1; i >= 0; i--) {
                const star = stars[i];
                const distance = Math.sqrt(
                    Math.pow(player.x - star.x, 2) + Math.pow(player.y - star.y, 2)
                );
                if (distance < 45) { // Player radius 30 + star radius 15
                    stars.splice(i, 1);
                    score++;
                    
                    // Play star sound
                    playStarSound();
                    
                    // Add new star
                    stars.push({
                        x: 50 + Math.random() * (WIDTH - 100),
                        y: 50 + Math.random() * (HEIGHT - 100),
                        color: `rgb(${Math.floor(Math.random() * 256)}, ${Math.floor(Math.random() * 256)}, ${Math.floor(Math.random() * 256)})`
                    });
                    
                    // Randomly change background color
                    currentBgColor = Math.floor(Math.random() * BACKGROUND_COLORS.length);
                    
                    // Update display
                    updateDisplay();
                }
            }
            
            // Detect obstacle collision
            obstacles.forEach(obstacle => {
                const distance = Math.sqrt(
                    Math.pow(player.x - obstacle.x, 2) + Math.pow(player.y - obstacle.y, 2)
                );
                if (distance < 50) { // Player radius 30 + obstacle radius 20
                    gameOver = true;
                    gameOverScreen.style.display = 'flex';
                    // Stop background music
                    stopBackgroundMusic();
                    // Play game over sound
                    playGameOverSound();
                    updateDisplay();
                }
            });
            
            // Countdown
            timeLeft -= 0.01;
            if (timeLeft <= 0) {
                timeLeft = 0;
                gameOver = true;
                gameOverScreen.style.display = 'flex';
                // Stop background music
                stopBackgroundMusic();
                // Play game over sound
                playGameOverSound();
                updateDisplay();
            } else {
                updateDisplay();
            }
        }
        
        // Game loop
        function gameLoop() {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Keyboard controls
        const keys = {
            left: false,
            right: false,
            up: false,
            down: false
        };
        
        document.addEventListener('keydown', (e) => {
            // Prevent default behavior for game control keys
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) {
                e.preventDefault();
            }
            
            switch (e.key) {
                case 'ArrowLeft':
                    keys.left = true;
                    break;
                case 'ArrowRight':
                    keys.right = true;
                    break;
                case 'ArrowUp':
                    keys.up = true;
                    break;
                case 'ArrowDown':
                    keys.down = true;
                    break;
                case ' ': // Spacebar
                case 'Spacebar': // For older browsers
                    if (!gameStarted) {
                        startGame();
                    } else if (gameOver) {
                        restartGame();
                    } else {
                        togglePause();
                    }
                    break;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            switch (e.key) {
                case 'ArrowLeft':
                    keys.left = false;
                    break;
                case 'ArrowRight':
                    keys.right = false;
                    break;
                case 'ArrowUp':
                    keys.up = false;
                    break;
                case 'ArrowDown':
                    keys.down = false;
                    break;
            }
        });
        
        // Touch controls
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!gameStarted || gamePaused || gameOver) {
                return;
            }
            const touch = e.touches[0];
            const touchX = touch.clientX;
            const touchY = touch.clientY;
            const deltaX = touchX - touchStartX;
            const deltaY = touchY - touchStartY;
            
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // Horizontal movement
                if (deltaX > 20) {
                    keys.right = true;
                    keys.left = false;
                } else if (deltaX < -20) {
                    keys.left = true;
                    keys.right = false;
                } else {
                    keys.left = false;
                    keys.right = false;
                }
            } else {
                // Vertical movement
                if (deltaY > 20) {
                    keys.down = true;
                    keys.up = false;
                } else if (deltaY < -20) {
                    keys.up = true;
                    keys.down = false;
                } else {
                    keys.up = false;
                    keys.down = false;
                }
            }
        });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys.left = false;
            keys.right = false;
            keys.up = false;
            keys.down = false;
        });
        
        // Mouse/touch screen taps
        document.addEventListener('click', (e) => {
            // Check if click is on control panels (music or difficulty)
            if (e.target.closest('.music-control') || e.target.closest('.difficulty-control')) {
                return; // Don't start/reset game when clicking controls
            }
            
            if (!gameStarted) {
                startGame();
            } else if (gamePaused) {
                togglePause();
            } else if (gameOver) {
                restartGame();
            }
        });
        
        // Start game
        function startGame() {
            gameStarted = true;
            startScreen.style.display = 'none';
            if (!animationId) {
                gameLoop();
            }
            // Start background music
            playBackgroundMusic();
        }
        
        // Toggle pause
        function togglePause() {
            gamePaused = !gamePaused;
            pauseScreen.style.display = gamePaused ? 'flex' : 'none';
            // Pause/resume background music
            if (gamePaused) {
                stopBackgroundMusic();
            } else {
                playBackgroundMusic();
            }
        }
        
        // Restart game
        function restartGame() {
            gameOverScreen.style.display = 'none';
            initGame();
            gameStarted = true;
            if (!animationId) {
                gameLoop();
            }
            // Restart background music
            stopBackgroundMusic();
            playBackgroundMusic();
        }
        
        // Quit game
        function quitGame() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            // Stop background music
            stopBackgroundMusic();
            initGame();
            startScreen.style.display = 'flex';
        }
        
        // Handle window resize
        function resizeCanvas() {
            const rect = { width: window.innerWidth, height: window.innerHeight };
            const aspectRatio = 4/3;
            
            if (rect.width / rect.height > aspectRatio) {
                HEIGHT = rect.height;
                WIDTH = HEIGHT * aspectRatio;
            } else {
                WIDTH = rect.width;
                HEIGHT = WIDTH / aspectRatio;
            }
            
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
            
            // Reset player position
            player.x = WIDTH / 2;
            player.y = HEIGHT / 2;
        }
        
        window.addEventListener('resize', resizeCanvas);
        
        // Initialize game
        initGame();
        resizeCanvas();
    </script>
</body>
</html>
