<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8"> <!-- 新增字符编码声明 -->
  <link rel="stylesheet" type="text/css" href="popup.css">
</head>

<body>
  <h1 class="panel-title" title="仅在研发环境使用，提高前端debug效率">前端debug工具</h1>
  <!-- 原按钮位置注释掉 -->
  <!-- <button id="getTechArticleInfo" class="tool-btn"...></button> -->
  <!-- <button id="getBatchTechArticleInfo" class="tool-btn"...></button> -->
  <button id="debugBtn" class="tool-btn" title="点击激活前端代码debug模式">进入debug模式</button>
  <div class="btn-group">
    <button id="loadLocalEnv" class="tool-btn" title="将配置的前端本地环境url挂接到当前环境，开始debug调试">挂本地环境debug</button>
    <button id="localSettingsBtn" class="tool-btn" title="配置前端本地开发环境url">配置本地环境</button>
  </div>
  <div class="btn-group">
    <button id="previewForm" class="tool-btn" title="在任意页面鼠标选中单据Id，点击按钮开始预览(也支持手动录入单据Id)">预览pc单据</button>
    <button id="previewMobileForm" class="tool-btn" title="在任意页面鼠标选中单据Id，点击按钮开始预览(也支持手动录入单据Id)">预览mob单据</button>
  </div>
  <div class="btn-group">
    <div class="flex-container">
      <button id="oldPlatform" class="tool-btn tool-btn-with-checkbox" title="打开旧开发平台">
        <span>开发平台</span>
        <input type="checkbox" id="debugCheckbox" class="debug-checkbox" title="勾选后，打开页面会默认开启debug模式">
      </button>
    </div>
    <button id="newPlatform" class="tool-btn" title="打开新开发平台">new开发平台</button>
  </div>
  <div class="dropdown">
    <button class="tool-btn" id="openTestEnv" title="打开常用测试环境">打开测试环境 ▼</button>
    <ul class="dropdown-menu"></ul>
  </div>
  <div class="dropdown">
    <button class="tool-btn" id="mountTestEnv" title="在当前测试环境挂接其他测试环境的前端代码">挂上测试环境前端代码 ▼</button>
    <ul class="dropdown-menu"></ul>
  </div>
  <div class="dropdown">
    <button class="tool-btn" id="docArchiveBtn" title="技术文档相关操作">技术文档归档 ▼</button>
    <ul class="dropdown-menu">
      <li id="getTechArticleInfo" title="【技术文档归档】- 解析当前打开的文章页面，获取需要的登记信息">获取文档登记信息</li>
      <li id="getBatchTechArticleInfo" title="【技术文档归档】- 批量获取文档登记信息">【批量】获取文档登记信息</li>
    </ul>
  </div>
  <div class="dropdown">
    <button class="tool-btn" id="otherMenu" title="其他不常用菜单">其他 ▼</button>
    <ul class="dropdown-menu">
      <li id="copyTabBtn" title="在当前页签右侧创建一个副本">一键复制页签</li>
      <li id="nocode" title="打开无代码应用">进入无代码</li>
    </ul>
  </div>
  <script src="constants.js"></script>
  <script src="popup.js"></script>
</body>

</html>
